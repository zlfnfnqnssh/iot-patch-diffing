{% extends "base.html" %}
{% block title %}Zero-Day Run {{ run_id }} - Patch-Learner{% endblock %}
{% block content %}
<p><a href="/zero-day">← Zero-Day runs</a></p>
<h1 id="title">Run #{{ run_id }}</h1>

<section id="meta" class="grid-wide"></section>

<section>
  <h2>Progress</h2>
  <div class="progress-row">
    <div class="progress-bar"><div id="bar"></div></div>
    <span id="progress-text" class="mono"></span>
  </div>
  <div class="filter-bar">
    <label><input type="checkbox" id="filter-vuln" checked> vuln only</label>
    <label>min conf: <input type="number" step="0.05" id="filter-conf" value="0.5"></label>
    <label>severity: <select id="filter-sev"><option value="">all</option><option>critical</option><option>high</option><option>medium</option><option>low</option></select></label>
    <button id="refresh">Refresh</button>
    <span class="muted" id="count"></span>
  </div>
</section>

<section>
  <h2>Verdicts</h2>
  <table id="verdicts">
    <thead>
      <tr>
        <th>id</th><th>addr</th><th>fn</th><th>conf</th><th>sev</th>
        <th>source → sink</th><th>missing</th><th>card</th><th>review</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="9" class="muted">로딩 중…</td></tr></tbody>
  </table>
</section>

<!-- Modal for verdict detail -->
<div id="modal" class="modal hidden">
  <div class="modal-inner">
    <button id="modal-close" class="close">×</button>
    <div id="modal-body">로딩 중…</div>
  </div>
</div>

<script>
const runId = {{ run_id }};

async function refresh() {
  const d = await fetch(`/api/zero-day/runs/${runId}`).then(r => r.json());
  document.getElementById('title').textContent = `Run #${runId}: ${d.name}`;
  document.getElementById('meta').innerHTML = `
    <div class="cell"><div class="k">target</div><div class="v">${d.target_vendor||''} / ${d.target_model||''}<br>v${d.target_version||''}</div></div>
    <div class="cell"><div class="k">binary</div><div class="v mono small">${d.target_binary||''}</div></div>
    <div class="cell"><div class="k">status</div><div class="v"><span class="status status-${d.status}">${d.status}</span></div></div>
    <div class="cell"><div class="k">total</div><div class="v">${d.total_functions}</div></div>
    <div class="cell"><div class="k">prefiltered</div><div class="v">${d.prefiltered_functions}</div></div>
    <div class="cell"><div class="k">processed</div><div class="v">${d.processed_functions}</div></div>
    <div class="cell"><div class="k">vuln cand</div><div class="v">${d.vuln_candidates}</div></div>
    <div class="cell"><div class="k">updated</div><div class="v small muted">${d.updated_at||''}</div></div>
  `;
  updateBar(d);
  await loadVerdicts();
}

function updateBar(d) {
  const pct = d.total_functions ? Math.round(100*d.processed_functions/d.total_functions) : 0;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent =
    `${d.processed_functions}/${d.total_functions} (${pct}%) | prefiltered=${d.prefiltered_functions} | vuln=${d.vuln_candidates}`;
}

async function loadVerdicts() {
  const vuln = document.getElementById('filter-vuln').checked ? 1 : null;
  const conf = document.getElementById('filter-conf').value;
  const sev  = document.getElementById('filter-sev').value;
  const params = {};
  if (vuln !== null) params.vuln = vuln;
  if (conf) params.min_conf = conf;
  const qs = new URLSearchParams(params).toString();
  const d = await fetch(`/api/zero-day/runs/${runId}/verdicts?${qs}&limit=300`).then(r => r.json());
  let rows = d.verdicts;
  if (sev) rows = rows.filter(v => v.severity_hint === sev);
  document.getElementById('count').textContent = `${rows.length} verdicts`;
  document.querySelector('#verdicts tbody').innerHTML = rows.map(v => `<tr>
    <td><a href="#" data-vid="${v.id}" class="open-verdict">${v.id}</a></td>
    <td class="mono small">${v.function_addr}</td>
    <td class="mono small">${v.function_name||''}</td>
    <td class="num">${v.confidence!=null ? v.confidence.toFixed(2) : ''}</td>
    <td><span class="sev sev-${v.severity_hint||'unset'}">${v.severity_hint||'-'}</span></td>
    <td class="mono small">${v.source_type||''} → ${v.sink_type||''}</td>
    <td class="mono small">${v.missing_check||''}</td>
    <td class="mono small">${v.matched_card_text ? '<a href="/cards/'+v.matched_card_pk+'">'+v.matched_card_text+'</a>' : (v.matched_card_pk ? '#'+v.matched_card_pk : 'novel')}</td>
    <td>${v.reviewed ? '✓ ' + (v.human_verdict||'') : (v.needs_human_review?'⚠':'')}</td>
  </tr>`).join('') || `<tr><td colspan="9" class="muted">none</td></tr>`;
  document.querySelectorAll('.open-verdict').forEach(el => {
    el.addEventListener('click', (e) => { e.preventDefault(); openVerdict(el.dataset.vid); });
  });
}

async function openVerdict(vid) {
  document.getElementById('modal-body').innerHTML = '로딩 중…';
  document.getElementById('modal').classList.remove('hidden');
  const v = await fetch(`/api/zero-day/verdicts/${vid}`).then(r => r.json());
  document.getElementById('modal-body').innerHTML = `
    <h2>Verdict #${v.id} — ${v.function_name||''} <span class="mono small">${v.function_addr}</span></h2>
    <div class="grid-wide">
      <div class="cell"><div class="k">vulnerable</div><div class="v">${v.is_vulnerable ? '✅ true' : '❌ false'}</div></div>
      <div class="cell"><div class="k">confidence</div><div class="v">${v.confidence}</div></div>
      <div class="cell"><div class="k">severity</div><div class="v"><span class="sev sev-${v.severity_hint||'unset'}">${v.severity_hint||'-'}</span></div></div>
      <div class="cell"><div class="k">needs human review</div><div class="v">${v.needs_human_review ? '⚠ yes' : 'no'}</div></div>
      <div class="cell"><div class="k">formula</div><div class="v mono">${v.source_type||''} → ${v.sink_type||''}<br>miss: ${v.missing_check||''}</div></div>
      <div class="cell"><div class="k">matched card</div><div class="v mono">${v.matched_card_text ? '<a href="/cards/'+v.matched_card_pk+'">'+v.matched_card_text+'</a>' : '(novel)'}</div></div>
      <div class="cell"><div class="k">matched score</div><div class="v">${v.matched_score!=null ? v.matched_score.toFixed(2) : '-'}</div></div>
      <div class="cell"><div class="k">agent</div><div class="v">${v.agent_id||''}</div></div>
    </div>
    <h3>Vulnerability type</h3>
    <div class="prose">${v.vuln_type||''}</div>
    <h3>Root cause</h3>
    <pre class="prose-block">${v.root_cause||''}</pre>
    <h3>Attack scenario</h3>
    <pre class="prose-block">${v.attack_scenario||''}</pre>
    <h3>Raw reasoning (audit)</h3>
    <pre class="prose-block small">${v.raw_reasoning||''}</pre>
    <details><summary>Function pseudocode</summary><pre class="code">${escapeHtml(v.pseudocode||'')}</pre></details>
    <h3>Human review</h3>
    <form id="review-form">
      <label><select name="human_verdict">
        <option value="">— choose —</option>
        <option value="confirmed_vuln">confirmed_vuln</option>
        <option value="false_positive">false_positive</option>
        <option value="needs_more_info">needs_more_info</option>
      </select></label>
      <br>
      <textarea name="human_note" rows="3" style="width:100%" placeholder="메모"></textarea>
      <button type="submit">Mark reviewed</button>
      <span id="review-result" class="muted small"></span>
    </form>
  `;
  const form = document.getElementById('review-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const body = {
      reviewed: true,
      human_verdict: fd.get('human_verdict') || null,
      human_note: fd.get('human_note') || null,
    };
    const r = await fetch(`/api/zero-day/verdicts/${v.id}/review`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    }).then(r => r.json()).catch(e => ({error: String(e)}));
    document.getElementById('review-result').textContent = r.error || `saved ✓`;
    await loadVerdicts();
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

document.getElementById('modal-close').addEventListener('click', () =>
  document.getElementById('modal').classList.add('hidden'));
document.getElementById('refresh').addEventListener('click', loadVerdicts);
['filter-vuln','filter-conf','filter-sev'].forEach(id => {
  document.getElementById(id).addEventListener('change', loadVerdicts);
});

// SSE live progress
const ev = new EventSource(`/api/zero-day/runs/${runId}/stream`);
ev.onmessage = (m) => {
  try { updateBar(JSON.parse(m.data)); } catch {}
};
ev.addEventListener('error', () => ev.close());

refresh();
</script>
{% endblock %}
